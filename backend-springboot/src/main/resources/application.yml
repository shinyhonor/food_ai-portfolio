spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: food_ai
    password: DUMMY_PASSWORD_FOR_GITHUB_UPLOAD
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8082