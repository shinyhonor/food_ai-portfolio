version: '3.8'

services:
  # Kafka: 내부 통신 최적화 및 볼륨 추가
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    # 포트 노출 최소화 (필요 시에만 9092 노출)
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://:9093
      # 컨테이너 간 통신을 위해 서비스명(kafka) 사용
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - food_network
    volumes:
      - kafka_data:/var/lib/kafka/data

  # MinIO: 포트 노출 제거(Nginx를 통해서만 접근)
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # S3 API (Spring Boot 접근용)
      - "9001:9001" # UI Console (관리자 접근용)
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: server /data --console-address ":9001" --address ":9000"
    networks:
      - food_network
    volumes:
      - minio_data:/data

  # Nginx: 유일한 외부 창구
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux/Windows 호스트 접속 보장
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - nginx_cache:/var/cache/nginx
    depends_on:
      - minio
    networks:
      - food_network

  # Redis: 분산 락 및 JWT(RTR) 토큰 저장소
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - food_network
    volumes:
      - redis_data:/data

networks:
  food_network: # 모든 컨테이너가 소통하는 독립된 가상 네트워크
    driver: bridge

volumes:
  minio_data:
  kafka_data: # Kafka 데이터 유실 방지
  nginx_cache:
  redis_data: # Redis 데이터 영속성 보장