upstream spring-backend {
    server host.docker.internal:8082;
    keepalive 32;
}

proxy_cache_path /var/cache/nginx/images levels=1:2 keys_zone=image_cache:10m max_size=1g inactive=7d use_temp_path=off;
proxy_cache_path /var/cache/nginx/auth levels=1:2 keys_zone=auth_cache:2m max_size=10m inactive=1m use_temp_path=off;

server {
    listen 80;
    server_name _;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 이미지 서빙 파이프라인
    location /images/ {
        # 서브 요청에서 변수가 덮어씌워지기 전에 미리 저장(Capture)
        set $captured_token $arg_token;
        set $captured_uri $uri;

        # 보안 및 캐시 무시 설정
        valid_referers none blocked server_names ~\.myapp\.com$ localhost;
        if ($invalid_referer) { return 403; }
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Set-Cookie;

        # 인증 위임 (변수 유실 방지를 위해 그대로 유지)
        auth_request /auth/verify;

        proxy_pass http://minio:9000/food-ai-bucket/;
        proxy_set_header Host $http_host;

        # 이미지 캐싱 설정
        proxy_cache image_cache;
        proxy_cache_key $uri; 
        proxy_cache_valid 200 7d;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on; 

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 인증 내부 API 파이프라인
    location = /auth/verify {
        internal;
        
        # 위에서 캡처한 데이터들을 헤더에 담아 보냅니다.
        proxy_pass http://spring-backend/api/images/verify-image;
        
        # $arg_token 이 아닌 캡처된 $captured_token 사용
        proxy_set_header X-Image-Token $captured_token;
        # $uri 가 아닌 캡처된 $captured_uri 사용
        proxy_set_header X-Image-Path $captured_uri;
        
        proxy_set_header Host $host;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # 인증 결과 캐싱
        proxy_cache auth_cache;
        proxy_cache_key "$captured_token:$captured_uri";
        proxy_cache_valid 200 10s;
        proxy_cache_valid 401 403 0s;

        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }
}